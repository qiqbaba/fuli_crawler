name: 定时爬虫任务

on:
  schedule:
    # 北京时间 03:00 = UTC 19:00（前一天）
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      crawler:
        description: '指定运行的爬虫模块'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - u3c3
          - seju
          - datang
          - gcbt
          - madou
          - jingpin_toupai
          - taose
          - dashen
          - tanhua
          - jingpin
          - mianfei_guochan
      start:
        description: '起始页码 (留空则默认为 1)'
        required: false
        default: '1'
      end:
        description: '结束页码 (留空则使用对应爬虫的默认值)'
        required: false
        default: '10000'
      no_early_stop:
        description: '是否禁用早停机制 (true 强制爬取所有指定页，false 在检测到重复时早停)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      resume:
        description: '是否启用断点续爬模式 (跳过已完成板块/页面，从上一次中断处继续)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      apply_params_to_all:
        description: '当选择 all 时，是否将 start/end/no_early_stop/resume 参数应用到每个爬虫 (false 则各爬虫使用默认参数)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # ========== 前置 job：统一抓取并验证代理，供后续所有爬虫共享 ==========
  fetch_proxies:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true   # 即使代理获取失败，也不阻塞爬虫运行（爬虫会回退到独立获取）
    env:
      ENABLE_PROXY_MANAGER: 'true'

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 恢复代理 IP 缓存（尝试复用上次已验证的代理）
        uses: actions/cache/restore@v4.2.3
        with:
          path: temp_profiles/
          key: proxy-cache-latest

      - name: 抓取并验证代理（供所有爬虫共享）
        run: |
          python -c "
          from utils.proxy_manager import init_proxy_manager
          mgr = init_proxy_manager(force_fetch=False, force_verify=False)
          if mgr:
              stats = mgr.get_stats()
              print(f'代理池就绪: 总计 {stats[\"total\"]} 个, 可用 {stats[\"working\"]} 个')
          else:
              print('代理管理器未启用')
          "

      - name: 删除旧的代理缓存（避免堆积）
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CACHE_ID=$(gh actions cache list --key proxy-cache-latest --repo ${{ github.repository }} --json id --jq '.[0].id' 2>/dev/null || echo "")
          if [ -n "$CACHE_ID" ]; then
            gh actions cache delete "$CACHE_ID" --repo ${{ github.repository }}
            echo "已删除旧缓存 (ID: $CACHE_ID)"
          else
            echo "没有找到旧缓存，跳过删除"
          fi

      - name: 保存代理 IP 缓存（共享，始终使用固定 key）
        uses: actions/cache/save@v4.2.3
        with:
          path: temp_profiles/
          key: proxy-cache-latest

  # ========== 爬虫并行 job ==========
  crawl:
    needs: fetch_proxies
    runs-on: ubuntu-latest
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        crawler: [seju, u3c3, datang, gcbt, madou, jingpin_toupai, taose, dashen, tanhua, jingpin, mianfei_guochan]

    env:
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
      R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL:       ${{ secrets.R2_ENDPOINT_URL }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # 云端临时 PDF 目录（上传 R2 后自动删除）
      PDF_BASE_DIR:          /tmp/pdfs
      # 启用内置代理IP管理器（自动获取并轮换免费代理）
      ENABLE_PROXY_MANAGER:  'true'

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 缓存 Playwright Chromium 浏览器
        uses: actions/cache@v4.2.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: 恢复代理 IP 列表（共享缓存）
        uses: actions/cache/restore@v4.2.3
        with:
          path: temp_profiles/
          key: proxy-cache-latest

      - name: 安装 Python 依赖和 Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 仅安装 Python 依赖（Playwright 已缓存）
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          pip install -r requirements.txt
          playwright install-deps chromium

      - name: 创建临时 PDF 目录
        run: mkdir -p /tmp/pdfs

      - name: 检查 workflow_dispatch 是否匹配当前爬虫
        id: check-crawler
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_CRAWLER="${{ github.event.inputs.crawler }}"
            if [ "$INPUT_CRAWLER" != "all" ] && [ "$INPUT_CRAWLER" != "${{ matrix.crawler }}" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "爬虫 ${{ matrix.crawler }} 不匹配手动输入的 $INPUT_CRAWLER，跳过"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 构建爬虫参数
        id: build-args
        if: steps.check-crawler.outputs.skip != 'true'
        run: |
          ARGS="--crawler ${{ matrix.crawler }} --crawl -q"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # workflow_dispatch: 如果选了 all 但 apply_params_to_all=false，不附加参数
            INPUT_CRAWLER="${{ github.event.inputs.crawler }}"
            APPLY_ALL="${{ github.event.inputs.apply_params_to_all }}"
            if [ "$INPUT_CRAWLER" = "all" ] && [ "$APPLY_ALL" != "true" ]; then
              echo "args=$ARGS" >> $GITHUB_OUTPUT
              exit 0
            fi
            # 附加参数
            if [ -n "${{ github.event.inputs.start }}" ]; then
              ARGS="$ARGS --start ${{ github.event.inputs.start }}"
            fi
            if [ -n "${{ github.event.inputs.end }}" ]; then
              ARGS="$ARGS --end ${{ github.event.inputs.end }}"
            fi
            if [ "${{ github.event.inputs.no_early_stop }}" = "true" ]; then
              ARGS="$ARGS --no-early-stop"
            fi
            if [ "${{ github.event.inputs.resume }}" = "true" ]; then
              ARGS="$ARGS --resume"
            fi
          else
            # 定时触发断点续爬配置（目前不使用）
            # 如需为某个爬虫开启断点续爬，可在此添加
            # if [ "${{ matrix.crawler }}" = "datang" ]; then
            #   ARGS="$ARGS --resume"
            # fi
            :
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: 执行爬虫 - ${{ matrix.crawler }}
        if: steps.check-crawler.outputs.skip != 'true'
        run: python main.py ${{ steps.build-args.outputs.args }}

      - name: 准备重试统计文件（重命名为唯一名称）
        if: always()
        run: |
          if [ -f logs/resource_retry_stats.csv ]; then
            cp logs/resource_retry_stats.csv logs/retry_${{ matrix.crawler }}.csv
          fi

      - name: 上传重试统计 CSV
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: retry-stats-${{ matrix.crawler }}
          path: logs/retry_${{ matrix.crawler }}.csv
          if-no-files-found: ignore

      - name: 清理临时 PDF 目录
        if: always()
        run: rm -rf /tmp/pdfs

  # ========== 汇总 job：合并所有爬虫的重试统计并提交到仓库 ==========
  merge_stats:
    if: always()
    needs: crawl
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 下载所有爬虫的重试统计 artifact
        uses: actions/download-artifact@v4.1.8
        with:
          pattern: retry-stats-*
          path: downloaded-stats/
          merge-multiple: true

      - name: 合并并提交统计文件
        run: |
          mkdir -p stats
          MERGED="stats/retry_stats.csv"
          HEADER="timestamp,source,title,url,attempts,retry_count,status,saved_path"

          # 写入文件头
          echo "$HEADER" > "$MERGED"

          # 遍历所有下载的 CSV，追加内容（跳过文件头行）
          for f in downloaded-stats/*.csv; do
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> "$MERGED"
              echo "已合并: $f"
            fi
          done

          echo "=== 合并后的统计文件 ==="
          wc -l "$MERGED"

          # 配置 git 并提交
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$MERGED"
          if git diff --cached --quiet; then
            echo "无变更，跳过提交"
          else
            git commit -m "chore: 更新重试统计数据 ($(date +'%Y-%m-%d'))"
            git push
            echo "已提交并推送重试统计数据"
          fi
