name: 定时爬虫任务

on:
  schedule:
    # 每天 UTC 18:00 = 北京时间次日凌晨 02:00
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      crawler:
        description: '指定运行的爬虫模块'
        required: true
        default: 'gcbt'
        type: choice
        options:
          - all
          - u3c3
          - seju
          - datang
          - gcbt
          - madou
          - jingpin_toupai
      start:
        description: '起始页码 (留空则默认为 1)'
        required: false
        default: '1'
      end:
        description: '结束页码 (留空则使用对应爬虫的默认值)'
        required: false
        default: '10000'
      no_early_stop:
        description: '是否禁用早停机制 (true 强制爬取所有指定页，false 在检测到重复时早停)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      resume:
        description: '是否启用断点续爬模式 (跳过已完成板块/页面，从上一次中断处继续)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      apply_params_to_all:
        description: '选择 all 时是否应用上面的 start/end/early_stop/resume 参数'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 最长运行 6 小时

    env:
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
      R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL:       ${{ secrets.R2_ENDPOINT_URL }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # 云端临时 PDF 目录（上传 R2 后自动删除）
      PDF_BASE_DIR:          /tmp/seju_pdfs
      # 启用内置代理IP管理器（自动获取并轮换免费代理）
      ENABLE_PROXY_MANAGER:  'true'

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 恢复/缓存代理 IP 列表
        uses: actions/cache@v4
        with:
          path: temp_profiles/proxy_cache.db
          key: ${{ runner.os }}-proxy-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-proxy-cache-

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright Chromium 浏览器
        run: |
          playwright install chromium --with-deps
          echo "Playwright Chromium 安装完成"

      - name: 创建临时 PDF 目录
        run: |
          mkdir -p /tmp/madou_pdfs
          mkdir -p /tmp/seju_pdfs
          mkdir -p /tmp/gcbt_pdfs
          mkdir -p /tmp/datang_pdfs
          mkdir -p /tmp/jingpin_toupai_pdfs

      - name: 执行爬虫任务
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CRAWLER="${{ github.event.inputs.crawler }}"
            if [ "$CRAWLER" = "all" ]; then
              # 根据 apply_params_to_all 决定是否附加通用参数
              COMMON_ARGS=""
              if [ "${{ github.event.inputs.apply_params_to_all }}" = "true" ]; then
                if [ -n "${{ github.event.inputs.start }}" ]; then
                  COMMON_ARGS="$COMMON_ARGS --start ${{ github.event.inputs.start }}"
                fi
                if [ -n "${{ github.event.inputs.end }}" ]; then
                  COMMON_ARGS="$COMMON_ARGS --end ${{ github.event.inputs.end }}"
                fi
                if [ "${{ github.event.inputs.no_early_stop }}" = "true" ]; then
                  COMMON_ARGS="$COMMON_ARGS --no-early-stop"
                fi
                if [ "${{ github.event.inputs.resume }}" = "true" ]; then
                  COMMON_ARGS="$COMMON_ARGS --resume"
                fi
                echo "全量模式应用通用参数:$COMMON_ARGS"
              else
                echo "全量模式使用默认参数（忽略手动输入的 start/end/early_stop/resume）"
              fi

              echo "=== 开始爬取 seju ==="
              python main.py --crawler seju --crawl $COMMON_ARGS
              echo "=== seju 完成 ==="
              echo "=== 开始爬取 u3c3 ==="
              python main.py --crawler u3c3 --crawl $COMMON_ARGS
              echo "=== u3c3 完成 ==="
              echo "=== 开始爬取 datang ==="
              python main.py --crawler datang --crawl $COMMON_ARGS
              echo "=== datang 完成 ==="
              echo "=== 开始爬取 gcbt ==="
              python main.py --crawler gcbt --crawl $COMMON_ARGS
              echo "=== gcbt 完成 ==="
              echo "=== 开始爬取 madou ==="
              python main.py --crawler madou --crawl $COMMON_ARGS
              echo "=== madou 完成 ==="
              echo "=== 开始爬取 jingpin_toupai ==="
              python main.py --crawler jingpin_toupai --crawl $COMMON_ARGS
              echo "=== jingpin_toupai 完成 ==="
            else
              CMD="python main.py --crawler $CRAWLER --crawl -q"
              if [ -n "${{ github.event.inputs.start }}" ]; then
                CMD="$CMD --start ${{ github.event.inputs.start }}"
              fi
              if [ -n "${{ github.event.inputs.end }}" ]; then
                CMD="$CMD --end ${{ github.event.inputs.end }}"
              fi
              if [ "${{ github.event.inputs.no_early_stop }}" = "true" ]; then
                CMD="$CMD --no-early-stop"
              fi
              if [ "${{ github.event.inputs.resume }}" = "true" ]; then
                CMD="$CMD --resume"
              fi
              echo "手动运行命令: $CMD"
              eval $CMD
            fi
          else
            echo "定时触发，执行默认日常爬取..."
            echo "=== 开始爬取 seju ==="
            python main.py --crawler seju --crawl
            echo "=== seju 完成 ==="
            echo "=== 开始爬取 u3c3 ==="
            python main.py --crawler u3c3 --crawl
            echo "=== u3c3 完成 ==="
            echo "=== 开始爬取 datang ==="
            python main.py --crawler datang --crawl --resume
            echo "=== datang 完成 ==="
            echo "=== 开始爬取 gcbt ==="
            python main.py --crawler gcbt --crawl
            echo "=== gcbt 完成 ==="
            echo "=== 开始爬取 madou ==="
            python main.py --crawler madou --crawl
            echo "=== madou 完成 ==="
            echo "=== 开始爬取 jingpin_toupai ==="
            python main.py --crawler jingpin_toupai --crawl
            echo "=== jingpin_toupai 完成 ==="
          fi

      - name: 清理临时 PDF 目录
        if: always()
        run: |
          rm -rf /tmp/madou_pdfs
          rm -rf /tmp/seju_pdfs
          rm -rf /tmp/gcbt_pdfs
          rm -rf /tmp/datang_pdfs
          rm -rf /tmp/jingpin_toupai_pdfs
