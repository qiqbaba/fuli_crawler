name: 定时爬虫任务

on:
  schedule:
    # 北京时间 03:00 = UTC 19:00（前一天）
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      crawler:
        description: '指定运行的爬虫模块'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - u3c3
          - seju
          - datang
          - gcbt
          - madou
          - jingpin_toupai
          - taose
          - dashen
      start:
        description: '起始页码 (留空则默认为 1)'
        required: false
        default: '1'
      end:
        description: '结束页码 (留空则使用对应爬虫的默认值)'
        required: false
        default: '10000'
      no_early_stop:
        description: '是否禁用早停机制 (true 强制爬取所有指定页，false 在检测到重复时早停)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      resume:
        description: '是否启用断点续爬模式 (跳过已完成板块/页面，从上一次中断处继续)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        crawler: [seju, u3c3, datang, gcbt, madou, jingpin_toupai, taose, dashen]

    env:
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
      R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL:       ${{ secrets.R2_ENDPOINT_URL }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # 云端临时 PDF 目录（上传 R2 后自动删除）
      PDF_BASE_DIR:          /tmp/pdfs
      # 启用内置代理IP管理器（自动获取并轮换免费代理）
      ENABLE_PROXY_MANAGER:  'true'

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 缓存 Playwright Chromium 浏览器
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: 获取当前日期
        id: get-date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 恢复代理 IP 列表
        uses: actions/cache/restore@v4
        with:
          path: temp_profiles/
          key: ${{ runner.os }}-proxy-cache-${{ matrix.crawler }}-${{ steps.get-date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-proxy-cache-${{ matrix.crawler }}-${{ steps.get-date.outputs.date }}-
            ${{ runner.os }}-proxy-cache-${{ matrix.crawler }}-
            ${{ runner.os }}-proxy-cache-

      - name: 安装 Python 依赖和 Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 仅安装 Python 依赖（Playwright 已缓存）
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          pip install -r requirements.txt

      - name: 创建临时 PDF 目录
        run: mkdir -p /tmp/pdfs

      - name: 检查 workflow_dispatch 是否匹配当前爬虫
        id: check-crawler
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_CRAWLER="${{ github.event.inputs.crawler }}"
            if [ "$INPUT_CRAWLER" != "all" ] && [ "$INPUT_CRAWLER" != "${{ matrix.crawler }}" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "爬虫 ${{ matrix.crawler }} 不匹配手动输入的 $INPUT_CRAWLER，跳过"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 构建爬虫参数
        id: build-args
        if: steps.check-crawler.outputs.skip != 'true'
        run: |
          ARGS="--crawler ${{ matrix.crawler }} --crawl -q"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # workflow_dispatch: 如果选了 all 但 apply_params_to_all=false，不附加参数
            INPUT_CRAWLER="${{ github.event.inputs.crawler }}"
            APPLY_ALL="${{ github.event.inputs.apply_params_to_all }}"
            if [ "$INPUT_CRAWLER" = "all" ] && [ "$APPLY_ALL" != "true" ]; then
              echo "args=$ARGS" >> $GITHUB_OUTPUT
              exit 0
            fi
            # 附加参数
            if [ -n "${{ github.event.inputs.start }}" ]; then
              ARGS="$ARGS --start ${{ github.event.inputs.start }}"
            fi
            if [ -n "${{ github.event.inputs.end }}" ]; then
              ARGS="$ARGS --end ${{ github.event.inputs.end }}"
            fi
            if [ "${{ github.event.inputs.no_early_stop }}" = "true" ]; then
              ARGS="$ARGS --no-early-stop"
            fi
            if [ "${{ github.event.inputs.resume }}" = "true" ]; then
              ARGS="$ARGS --resume"
            fi
          else
            # 定时触发：datang 带上 --resume
            if [ "${{ matrix.crawler }}" = "datang" ]; then
              ARGS="$ARGS --resume"
            fi
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: 执行爬虫 - ${{ matrix.crawler }}
        if: steps.check-crawler.outputs.skip != 'true'
        run: python main.py ${{ steps.build-args.outputs.args }}

      - name: 保存代理 IP 缓存 - ${{ matrix.crawler }}
        uses: actions/cache/save@v4
        if: always()
        with:
          path: temp_profiles/
          key: ${{ runner.os }}-proxy-cache-${{ matrix.crawler }}-${{ steps.get-date.outputs.date }}-${{ github.run_id }}

      - name: 清理临时 PDF 目录
        if: always()
        run: rm -rf /tmp/pdfs
