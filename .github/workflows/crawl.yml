name: 定时爬虫任务

on:
  schedule:
    # 每天 UTC 18:00 = 北京时间次日凌晨 02:00
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      crawler:
        description: '指定运行的爬虫模块'
        required: true
        default: 'u3c3'
        type: choice
        options:
          - u3c3
          - seju
          - datang
      start:
        description: '起始页码 (留空则默认为 1)'
        required: false
        default: '5751'
      end:
        description: '结束页码 (留空则使用对应爬虫的默认值)'
        required: false
        default: '9000'
      no_early_stop:
        description: '是否禁用早停机制 (true 强制爬取所有指定页，false 在检测到重复时早停)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 最长运行 6 小时

    env:
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
      R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL:       ${{ secrets.R2_ENDPOINT_URL }}
      # 云端临时 PDF 目录（上传 R2 后自动删除）
      PDF_BASE_DIR:          /tmp/seju_pdfs
      # 启用内置代理IP管理器（自动获取并轮换免费代理）
      ENABLE_PROXY_MANAGER:  'true'

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright Chromium 浏览器
        run: playwright install chromium --with-deps

      - name: 创建临时 PDF 目录
        run: mkdir -p /tmp/seju_pdfs

      - name: 执行爬虫任务
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CMD="python main.py --crawler ${{ github.event.inputs.crawler }} --crawl -q"
            if [ -n "${{ github.event.inputs.start }}" ]; then
              CMD="$CMD --start ${{ github.event.inputs.start }}"
            fi
            if [ -n "${{ github.event.inputs.end }}" ]; then
              CMD="$CMD --end ${{ github.event.inputs.end }}"
            fi
            if [ "${{ github.event.inputs.no_early_stop }}" = "true" ]; then
              CMD="$CMD --no-early-stop"
            fi
            echo "手动运行命令: $CMD"
            eval $CMD
          else
            echo "定时触发，执行默认日常爬取..."
            python main.py --crawler seju --crawl || true
            python main.py --crawler u3c3 --crawl || true
          fi

      - name: 清理临时 PDF 目录
        if: always()
        run: rm -rf /tmp/seju_pdfs
